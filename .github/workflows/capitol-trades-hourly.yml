name: CapitolTrades Hourly Alert

on:
  schedule:
    - cron: "17 * * * *"   # every hour at minute 17 (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capitol-trades-hourly
  cancel-in-progress: true

jobs:
  check-trades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test email (manual run only)
        if: github.event_name == 'workflow_dispatch'
        env:
          SMTP_HOST: "smtp-mail.outlook.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.message import EmailMessage

          host = os.environ["SMTP_HOST"]
          port = int(os.environ["SMTP_PORT"])
          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASSWORD"]
          mail_from = os.environ["SMTP_FROM"]
          mail_to = [x.strip() for x in os.environ["SMTP_TO"].split(",") if x.strip()]

          msg = EmailMessage()
          msg["Subject"] = "Test email from GitHub Actions (CapitolTrades setup)"
          msg["From"] = mail_from
          msg["To"] = ", ".join(mail_to)
          msg.set_content(
              "This is a test email from your GitHub Actions workflow.\n\n"
              "If you received this, your Outlook SMTP setup works correctly."
          )

          with smtplib.SMTP(host, port, timeout=30) as server:
              server.starttls()
              server.login(user, password)
              server.send_message(msg)

          print("Test email sent successfully.")
          PY

      - name: Run CapitolTrades checker
        env:
          SMTP_HOST: "smtp-mail.outlook.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USE_TLS: "true"
          SMTP_USE_SSL: "false"
          PAGES_TO_SCAN: "2"
          BOOTSTRAP_SKIP_EXISTING: "true"
          STATE_FILE: "seen_trade_ids.json"
        run: python capitol_trades_check_once.py

      # IMPORTANT:
      # Skip state commit on manual runs to avoid push conflicts while you're testing/editing.
      # The scheduled hourly run WILL commit the state file automatically.
      - name: Commit updated state file (scheduled runs only)
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add seen_trade_ids.json || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update seen trades state [skip ci]"

          BRANCH="${{ github.ref_name }}"

          # Retry push a few times in case repo changed mid-run
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git fetch origin "$BRANCH"
            if git rebase "origin/$BRANCH"; then
              if git push origin HEAD:"$BRANCH"; then
                echo "Push succeeded."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            sleep 5
          done

          echo "Failed to push state file after retries."
          exit 1
